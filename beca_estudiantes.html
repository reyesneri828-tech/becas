<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Apoyo para Esudiantes</title>
</head>
<body>
<h2>Formulario de Apoyo para Estudiantes</h2>
<form action="beca.php" method="POST">
<label>Nombre:</label>
<input type="text" name="nombre" required><br><br>
 
<label>Apellidos:</label>
<input type="text" name="apellidos" required><br><br>
 
<label>Fecha nacimiento: </label>
<input type="text" name="fecha_nacimiento" required><br><br>
 
<label>Edad:</label>
<input type="number" name="edad" required><br><br>
 
<label>Correo:</label>
<input type="email" name="correo" required><br><br>
 
<label>Teléfono:</label>
<input type="text" name="tel" required><br><br>
 
<label>Municipio:</label>
<input type="text" name="municipio" required><br><br>
 
 
<label>CURP:</label>
<input type="text" name="curp" required><br><br>
 
<label>Domicilio:</label>
<input type="text" name="domicilio" required><br><br>
 
<label>Sexo:</label>
<select name="sexo" required>
<option value="Femenino">Femenino</option>
<option value="Masculino">Masculino</option>
</select><br><br>
 
<label>Nivel educativo:</label>
<select name="nivel" required>
<option value="basico">Básico</option>
<option value="medio">Medio</option>
<option value="superior">Superior</option>
</select><br><br>
 
<label>Promedio:</label>
<input type="number" step="0.1" name="promedio" required><br><br>
 
<label>¿Cuenta con otra beca?:</label>
<select name="beca" required>
<option value="no">No</option>
<option value="si">Sí</option>
</select><br><br>
 
<button type="submit">Enviar Solicitud</button>
</form>
</body>
</html>
