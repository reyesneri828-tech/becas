<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Apoyo para Mujeres</title>
</head>
<body>
  <h1>Formulario de Apoyo para Mujeres</h1>
  <form action="procesar.php" method="POST">
    <label>Nombre:</label><br>
    <input type="text" name="nombre" required><br><br>

    <label>Fecha de nacimiento:</label><br>
    <input type="date" name="fecha_nacimiento" required><br><br>

    <label>CURP:</label><br>
    <input type="text" name="curp" required><br><br>

    <label>INE:</label><br>
    <input type="text" name="ine" required><br><br>

    <label>Municipio:</label><br>
    <input type="text" name="municipio" required><br><br>

    <label>Correo electrónico:</label><br>
    <input type="email" name="correo" required><br><br>

    <label>Teléfono:</label><br>
    <input type="tel" name="telefono" required><br><br>

    <label>Género:</label><br>
    <select name="genero" required>
      <option value="Femenino">Femenino</option>
      <option value="Masculino">Masculino</option>
    </select><br><br>

    <label>Estado civil:</label><br>
    <select name="estadocivil" required>
      <option value="Soltera">Soltera</option>
      <option value="Casada">Casada</option>
      <option value="Otro">Otro</option>
    </select><br><br>

    <label>¿Tiene hijos menores de edad?</label><br>
    <select name="hijos" required>
      <option value="Si">Sí</option>
      <option value="No">No</option>
    </select><br><br>

    <label>¿Recibe otro apoyo?</label><br>
    <select name="apoyo" required>
      <option value="No">No</option>
      <option value="Si">Sí</option>
    </select><br><br>

    <input type="submit" value="Enviar solicitud">
  </form>
</body>
</html>
